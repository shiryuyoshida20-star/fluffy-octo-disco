<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>蔵書アラート — 発売日・購入管理</title>
<meta name="theme-color" content="#233B5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="蔵書アラート">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23233B5C'/%3E%3Crect x='140' y='100' width='160' height='220' rx='10' fill='%23FBF8F0'/%3E%3Crect x='150' y='115' width='80' height='8' rx='4' fill='%23D8CFBC'/%3E%3Crect x='150' y='133' width='120' height='6' rx='3' fill='%23D8CFBC'/%3E%3Crect x='150' y='149' width='100' height='6' rx='3' fill='%23D8CFBC'/%3E%3Crect x='140' y='330' width='230' height='80' rx='10' fill='%23A9824F' opacity='.7'/%3E%3Ccircle cx='340' cy='340' r='90' fill='%23B23A2E'/%3E%3Ctext x='340' y='360' text-anchor='middle' font-size='90' fill='white' font-family='serif'%3E新%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E8%94%B5%E6%9B%B8%E3%82%A2%E3%83%A9%E3%83%BC%E3%83%88%22%2C%22short_name%22%3A%22%E8%94%B5%E6%9B%B8%22%2C%22start_url%22%3A%22.%2Fcomic-alert.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ECE6D6%22%2C%22theme_color%22%3A%22%23233B5C%22%7D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#ECE6D6;
    --paper-card:#FBF8F0;
    --ink:#262220;
    --ink-soft:#5b554c;
    --indigo:#233B5C;
    --indigo-light:#3D5A80;
    --indigo-pale:#dfe6ee;
    --stamp:#B23A2E;
    --gold:#A9824F;
    --line:#D8CFBC;
    --success:#4F7359;
    --radius:10px;
    --shadow:0 1px 2px rgba(38,34,32,.08), 0 4px 14px rgba(38,34,32,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans JP',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:100px;
  }
  h1,h2,h3,.serif{font-family:'Noto Serif JP',serif;}

  /* ---------- Header ---------- */
  header.app-header{
    position:sticky; top:0; z-index:30;
    background:var(--indigo);
    color:#F4EFE2;
    padding:14px 16px 12px;
    box-shadow:var(--shadow);
  }
  .header-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .app-title{font-size:19px; font-weight:700; letter-spacing:.03em; margin:0; display:flex; align-items:center; gap:8px;}
  .app-title .mark{
    display:inline-block; width:9px; height:9px; border-radius:50%;
    background:var(--stamp); flex:none;
  }
  .app-sub{font-size:11px; color:#c9d2dd; margin:2px 0 0; letter-spacing:.04em;}
  .auth-area{display:flex; align-items:center; gap:8px;}
  .btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:600;
    border-radius:999px; padding:8px 14px; font-size:13px;
    transition:transform .08s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn-google{background:#fff; color:var(--indigo); display:flex; align-items:center; gap:6px;}
  .btn-ghost{background:rgba(255,255,255,.12); color:#F4EFE2;}
  .user-chip{display:flex; align-items:center; gap:6px; font-size:12px; color:#dfe6ee;}
  .user-chip img{width:24px; height:24px; border-radius:50%; border:1px solid rgba(255,255,255,.4);}

  /* ---------- Toolbar ---------- */
  .toolbar{
    background:var(--paper); padding:12px 16px 8px;
    position:sticky; top:64px; z-index:20;
    border-bottom:1px solid var(--line);
  }
  .search-row{display:flex; gap:8px; margin-bottom:8px;}
  .search-row input[type="text"]{
    flex:1; padding:9px 12px; border-radius:var(--radius); border:1px solid var(--line);
    background:var(--paper-card); font-size:14px; font-family:inherit; color:var(--ink);
  }
  select{
    padding:9px 10px; border-radius:var(--radius); border:1px solid var(--line);
    background:var(--paper-card); font-size:13px; font-family:inherit; color:var(--ink);
  }
  .chip-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;}
  .chip{
    border:1px solid var(--line); background:var(--paper-card); color:var(--ink-soft);
    border-radius:999px; padding:6px 12px; font-size:12px; cursor:pointer; font-weight:500;
  }
  .chip.active{background:var(--indigo); color:#fff; border-color:var(--indigo);}
  .switch-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .switch-label{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-soft); font-weight:500;}
  .switch{
    position:relative; width:38px; height:22px; border-radius:999px; background:#cfc6b2;
    cursor:pointer; flex:none; transition:background .15s;
  }
  .switch.on{background:var(--indigo);}
  .switch::after{
    content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
    background:#fff; transition:transform .15s; box-shadow:0 1px 2px rgba(0,0,0,.25);
  }
  .switch.on::after{transform:translateX(16px);}
  .sort-select-wrap{font-size:12px; color:var(--ink-soft); display:flex; align-items:center; gap:6px;}

  /* ---------- List ---------- */
  main{padding:10px 12px 0;}
  .series-group{margin-bottom:18px;}
  .series-heading{
    display:flex; align-items:baseline; gap:8px; padding:6px 6px 8px; border-bottom:1px solid var(--gold);
    margin-bottom:8px;
  }
  .series-heading h2{font-size:15px; margin:0; font-weight:700; letter-spacing:.02em;}
  .series-count{font-size:11px; color:var(--ink-soft);}

  .card{
    background:var(--paper-card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:12px; display:flex; gap:12px; margin-bottom:10px; position:relative; overflow:hidden;
  }
  .cover{
    width:54px; height:76px; flex:none; border-radius:4px; background:var(--indigo-pale);
    background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center;
    color:var(--indigo-light); font-size:10px; text-align:center; overflow:hidden;
  }
  .card-body{flex:1; min-width:0;}
  .card-top{display:flex; justify-content:space-between; gap:8px;}
  .card-title{font-size:14.5px; font-weight:700; line-height:1.4; margin:0;}
  .vol-badge{
    display:inline-block; font-size:11px; background:var(--indigo-pale); color:var(--indigo);
    border-radius:5px; padding:1px 6px; margin-left:4px; font-weight:600; white-space:nowrap;
  }
  .meta-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:5px; align-items:center;}
  .badge{
    font-size:10.5px; padding:2px 7px; border-radius:5px; font-weight:600; letter-spacing:.02em;
  }
  .badge-spinoff{background:#efe2cf; color:var(--gold);}
  .badge-upcoming{background:#fdecea; color:var(--stamp);}
  .badge-released{background:#e7efe6; color:var(--success);}
  .badge-cal{background:var(--indigo-pale); color:var(--indigo);}
  .date-text{font-size:11.5px; color:var(--ink-soft); font-variant-numeric:tabular-nums;}

  .card-actions{display:flex; align-items:center; gap:10px; margin-top:8px;}
  .purchase-toggle{
    display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; cursor:pointer;
    color:var(--ink-soft);
  }
  .purchase-toggle .box{
    width:20px; height:20px; border-radius:5px; border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; flex:none;
  }
  .purchase-toggle.checked .box{background:var(--success); border-color:var(--success); color:#fff;}
  .purchase-toggle.checked{color:var(--success);}
  .icon-btn{
    background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:13px;
    padding:4px 6px; border-radius:6px;
  }
  .icon-btn:hover{background:var(--indigo-pale);}

  /* stamp */
  .stamp-mark{
    position:absolute; top:8px; right:10px; width:46px; height:46px; border-radius:50%;
    border:2.5px solid var(--stamp); color:var(--stamp); display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif JP',serif; font-weight:700; font-size:11px; letter-spacing:.05em;
    transform:rotate(-14deg); opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
  }
  .card.purchased .stamp-mark{opacity:.85; transform:rotate(-14deg) scale(1);}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
  }
  .empty-state h3{margin:0 0 6px; font-size:15px;}
  .empty-state p{font-size:12.5px; margin:0;}

  .hidden-spinoff-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 12px; opacity:.7;
  }
  .hidden-spinoff-info{display:flex; align-items:center; gap:8px; min-width:0;}
  .hidden-title{font-size:12.5px; color:var(--ink-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed; right:18px; bottom:24px; width:54px; height:54px; border-radius:50%;
    background:var(--stamp); color:#fff; border:none; font-size:26px; box-shadow:0 4px 14px rgba(178,58,46,.4);
    cursor:pointer; z-index:40; display:flex; align-items:center; justify-content:center;
  }
  .fab:active{transform:scale(.94);}

  /* ---------- Form panel ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(38,34,32,.45); z-index:50; display:none;
  }
  .overlay.open{display:block;}
  .panel{
    position:fixed; left:0; right:0; bottom:0; max-height:92vh; overflow-y:auto;
    background:var(--paper); border-radius:18px 18px 0 0; z-index:60;
    transform:translateY(100%); transition:transform .22s ease; padding:18px 18px calc(24px + env(safe-area-inset-bottom));
    box-shadow:0 -4px 20px rgba(0,0,0,.2);
  }
  .panel.open{transform:translateY(0);}
  .panel-handle{width:38px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 14px;}
  .panel h2{font-size:16px; margin:0 0 14px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; letter-spacing:.02em;}
  .field input[type="text"], .field input[type="date"], .field textarea{
    width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--paper-card); font-family:inherit; font-size:14px; color:var(--ink);
  }
  .field textarea{resize:vertical; min-height:54px;}
  .isbn-row{display:flex; gap:8px;}
  .isbn-row input{flex:1;}
  .lookup-btn{
    background:var(--indigo); color:#fff; border:none; border-radius:8px; padding:0 16px;
    font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  .lookup-status{font-size:11.5px; color:var(--ink-soft); margin-top:4px;}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .toggle-field{
    display:flex; align-items:center; justify-content:space-between; padding:10px 2px;
    border-bottom:1px solid var(--line);
  }
  .toggle-field:last-child{border-bottom:none;}
  .toggle-field .tlabel{font-size:13.5px; font-weight:600;}
  .toggle-field .tdesc{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .panel-footer{display:flex; gap:10px; margin-top:18px;}
  .btn-primary{flex:1; background:var(--indigo); color:#fff; padding:13px; font-size:14.5px; border-radius:10px;}
  .btn-secondary{background:none; color:var(--ink-soft); padding:13px 16px; font-size:13.5px;}
  .btn-danger{background:none; color:var(--stamp); padding:13px 4px; font-size:13px; font-weight:600;}

  /* toast */
  #toast{
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:12.5px;
    opacity:0; pointer-events:none; transition:all .2s; z-index:80; white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .hidden{display:none !important;}
  .config-warning{
    margin:16px 12px; padding:14px 16px; background:#fdecea; border:1px solid #f1c2bb;
    border-radius:10px; font-size:12.5px; color:#7a2a20; line-height:1.6;
  }

  /* ---------- Series link ---------- */
  .series-link{
    cursor:pointer; color:var(--indigo); text-decoration:underline dotted;
    font-size:11.5px; font-weight:600;
  }
  .series-link:hover{color:var(--indigo-light);}

  /* ---------- Amazon button ---------- */
  .amazon-btn{
    display:inline-flex; align-items:center; gap:4px;
    background:#FF9900; color:#fff; border:none; border-radius:6px;
    font-size:11px; font-weight:700; padding:4px 8px; cursor:pointer;
    text-decoration:none; white-space:nowrap;
  }
  .amazon-btn:hover{opacity:.88;}

  /* ---------- Series detail panel ---------- */
  .series-panel{
    position:fixed; left:0; right:0; bottom:0; max-height:92vh; overflow-y:auto;
    background:var(--paper); border-radius:18px 18px 0 0; z-index:70;
    transform:translateY(100%); transition:transform .22s ease;
    padding:18px 16px calc(24px + env(safe-area-inset-bottom));
    box-shadow:0 -4px 20px rgba(0,0,0,.2);
  }
  .series-panel.open{transform:translateY(0);}
  .series-panel-handle{width:38px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 14px;}
  .series-panel-header{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; gap:10px;}
  .series-panel-header h2{font-size:16px; margin:0 0 6px;}
  .series-stats{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
  .stat-chip{
    background:var(--paper-card); border:1px solid var(--line); border-radius:8px;
    padding:6px 12px; font-size:12px; color:var(--ink-soft);
  }
  .stat-chip strong{color:var(--ink); font-weight:700;}
  .series-vol-list{display:flex; flex-direction:column; gap:8px;}
  .series-vol-row{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--paper-card); border-radius:8px; padding:10px 12px;
    border:1px solid var(--line);
  }
  .series-vol-info{flex:1; min-width:0;}
  .series-vol-title{font-size:13px; font-weight:600; margin:0 0 2px;}
  .series-vol-meta{font-size:11px; color:var(--ink-soft);}
  .series-vol-actions{display:flex; align-items:center; gap:6px; flex:none;}
  .series-close-btn{
    background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-soft); padding:0 4px;
  }

  /* ---------- 新刊チェック ---------- */
  .check-btn{
    background:var(--indigo); color:#fff; border:none; border-radius:8px;
    padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  .check-btn:disabled{opacity:.5; cursor:default;}
  .check-result-section{margin-top:16px; border-top:1px solid var(--line); padding-top:14px;}
  .check-result-title{font-size:13px; font-weight:700; color:var(--ink-soft); margin:0 0 10px;}
  .new-vol-row{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:#EAF2E8; border:1px solid #b8d9b2; border-radius:8px; padding:10px 12px; margin-bottom:8px;
  }
  .new-vol-info{flex:1; min-width:0;}
  .new-vol-title{font-size:13px; font-weight:600; margin:0 0 2px; color:var(--ink);}
  .new-vol-meta{font-size:11px; color:var(--ink-soft);}
  .add-vol-btn{
    background:var(--success); color:#fff; border:none; border-radius:6px;
    font-size:12px; font-weight:700; padding:6px 10px; cursor:pointer; white-space:nowrap;
  }

  /* ---------- タイトル検索結果 ---------- */
  .title-search-result{
    display:flex; align-items:center; gap:10px; padding:8px 10px; margin-bottom:6px;
    background:var(--paper-card); border:1px solid var(--line); border-radius:8px; cursor:pointer;
  }
  .title-search-result:hover{border-color:var(--indigo); background:var(--indigo-pale);}
  .title-search-cover{
    width:36px; height:50px; flex:none; border-radius:4px; background:var(--indigo-pale);
    background-size:cover; background-position:center;
  }
  .title-search-info{flex:1; min-width:0;}
  .title-search-name{font-size:13px; font-weight:600; margin:0 0 2px; color:var(--ink);}
  .title-search-meta{font-size:11px; color:var(--ink-soft);}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <div>
      <h1 class="app-title"><span class="mark"></span>蔵書アラート</h1>
      <p class="app-sub">発売日・購入・カレンダー連携の管理台帳</p>
    </div>
    <div class="auth-area" id="authArea"></div>
  </div>
</header>

<div id="configWarning" class="config-warning hidden">
  Firebaseの設定が未入力です。ファイル先頭の <code>firebaseConfig</code> を、図書館スリップで使っているプロジェクトの値で埋めてください。
</div>

<div class="toolbar">
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="タイトルで検索…">
    <select id="seriesFilter"><option value="">すべてのシリーズ</option></select>
  </div>
  <div class="chip-row" id="statusChips">
    <button class="chip active" data-status="all">すべて</button>
    <button class="chip" data-status="unpurchased">未購入</button>
    <button class="chip" data-status="purchased">購入済</button>
    <button class="chip" data-status="upcoming">発売前</button>
    <button class="chip" data-status="released">発売済</button>
  </div>
  <div class="switch-row">
    <label class="switch-label">
      <span class="switch on" id="spinoffSwitch"></span>
      スピンオフ作品も表示する
    </label>
    <div class="sort-select-wrap">
      並び順
      <select id="sortSelect">
        <option value="date">発売日順</option>
        <option value="series">シリーズ順</option>
        <option value="added">追加順（新しい順）</option>
      </select>
    </div>
  </div>
</div>

<main id="listContainer"></main>

<button class="fab" id="fabAdd" title="新規追加">＋</button>

<div class="overlay" id="overlay"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <h2 id="panelTitle">新規登録</h2>

  <div class="field">
    <label>タイトルで検索（openBD）</label>
    <div class="isbn-row">
      <input type="text" id="f_title_search" placeholder="タイトル名を入力して検索…">
      <button class="lookup-btn" id="titleSearchBtn">検索</button>
    </div>
    <div id="titleSearchResults" style="margin-top:6px;"></div>
  </div>

  <div class="field">
    <label>ISBN（自動入力 / openBD）</label>
    <div class="isbn-row">
      <input type="text" id="f_isbn" placeholder="例: 9784XXXXXXXXX" inputmode="numeric">
      <button class="lookup-btn" id="lookupBtn">検索</button>
    </div>
    <div class="lookup-status" id="lookupStatus"></div>
  </div>

  <div class="field">
    <label>タイトル <span style="color:var(--stamp)">*</span></label>
    <input type="text" id="f_title" placeholder="タイトル">
  </div>

  <div class="two-col">
    <div class="field">
      <label>巻数</label>
      <input type="text" id="f_volume" placeholder="例: 3">
    </div>
    <div class="field">
      <label>発売日</label>
      <input type="date" id="f_date">
    </div>
  </div>

  <div class="field">
    <label>シリーズ名（グループ分けに使用）</label>
    <input type="text" id="f_series" placeholder="例: ◯◯◯◯">
  </div>

  <div class="two-col">
    <div class="field">
      <label>出版社</label>
      <input type="text" id="f_publisher" placeholder="出版社">
    </div>
    <div class="field">
      <label>著者</label>
      <input type="text" id="f_author" placeholder="著者">
    </div>
  </div>

  <div class="toggle-field">
    <div>
      <div class="tlabel">スピンオフ作品</div>
      <div class="tdesc">本編とは別に表示/非表示を切り替えられます</div>
    </div>
    <span class="switch" id="spinoffFieldSwitch"></span>
  </div>
  <div class="field hidden" id="parentSeriesWrap">
    <label>親シリーズ名</label>
    <input type="text" id="f_parent" placeholder="本編のシリーズ名">
  </div>
  <div class="toggle-field hidden" id="spinoffVisibleWrap">
    <div>
      <div class="tlabel">一覧に表示する</div>

<script>
/* =========================================================
   設定ここから ― 図書館スリップと同じFirebaseプロジェクトの値を貼り付けてください
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBShxHz9geQ7SdhpOa-jLzE0wlXchQt8ig",
  authDomain: "comic-alert.firebaseapp.com",
  databaseURL: "https://comic-alert-default-rtdb.firebaseio.com",
  projectId: "comic-alert",
  storageBucket: "comic-alert.firebasestorage.app",
  messagingSenderId: "789261903799",
  appId: "1:789261903799:web:34c30af85009e8af4c2a32"
};
// 図書館スリップと衝突しないよう、専用のルートパスを使います
const DB_ROOT = "comicAlert";
/* ========================================================= */

const isConfigured = !firebaseConfig.apiKey.includes("ここに");
if (!isConfigured) {
  document.getElementById('configWarning').classList.remove('hidden');
}

let app, auth, db;
if (isConfigured) {
  app = firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.database();
}

const CAL_SCOPE = "https://www.googleapis.com/auth/calendar.events";

let currentUser = null;
let accessToken = null; // Google OAuth access token (Calendar API用)
let allItems = {};      // {id: item}
let editingId = null;   // 編集中のID（nullなら新規）
let filters = { status: 'all', search: '', series: '', showSpinoff: true, sort: 'date' };

/* ---------------- ユーティリティ ---------------- */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function fmtDate(dateStr) {
  if (!dateStr) return "";
  const [y,m,d] = dateStr.split('-');
  return `${y}/${parseInt(m)}/${parseInt(d)}`;
}

/* ---------------- Firebase Auth (Google) ---------------- */
function renderAuthArea() {
  const el = document.getElementById('authArea');
  if (!isConfigured) { el.innerHTML = ''; return; }
  if (currentUser) {
    el.innerHTML = `
      <div class="user-chip">
        <img src="${currentUser.photoURL || ''}" alt="">
        <span>${currentUser.displayName || currentUser.email || ''}</span>
      </div>
      <button class="btn btn-ghost" id="logoutBtn">ログアウト</button>
    `;
    document.getElementById('logoutBtn').onclick = () => auth.signOut();
  } else {
    el.innerHTML = `<button class="btn btn-google" id="loginBtn">Googleでログイン</button>`;
    document.getElementById('loginBtn').onclick = doLogin;
  }
}

async function doLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope(CAL_SCOPE);
  provider.setCustomParameters({ prompt: 'consent' });
  try {
    const result = await auth.signInWithPopup(provider);
    const credential = firebase.auth.GoogleAuthProvider.credentialFromResult(result);
    accessToken = credential && credential.accessToken ? credential.accessToken : null;
    toast(accessToken ? "ログインしました（カレンダー連携 有効）" : "ログインしました（カレンダー権限が取得できませんでした）");
  } catch (e) {
    console.error(e);
    toast("ログインに失敗しました: " + (e.message || e.code));
  }
}

if (isConfigured) {
  auth.onAuthStateChanged(user => {
    currentUser = user;
    renderAuthArea();
    updateCalFieldDesc();
    if (user) {
      listenToItems();
    } else {
      accessToken = null;
      allItems = {};
      render();
    }
  });
}

function updateCalFieldDesc() {
  const desc = document.getElementById('calStatusText');
  if (!desc) return;
  if (currentUser && accessToken) {
    desc.textContent = "ログイン中（保存時にカレンダーへ反映されます）";
  } else if (currentUser && !accessToken) {
    desc.textContent = "カレンダー権限が未取得です。一度ログアウトし、再ログインしてください";
  } else {
    desc.textContent = "未連携（Googleログインが必要です）";
  }
}

/* ---------------- Firebase Database ---------------- */
function listenToItems() {
  if (!currentUser) return;
  const ref = db.ref(`${DB_ROOT}/${currentUser.uid}/items`);
  ref.on('value', snap => {
    allItems = snap.val() || {};
    render();
  });
}

function saveItemToDb(id, data) {
  return db.ref(`${DB_ROOT}/${currentUser.uid}/items/${id}`).set(data);
}
function deleteItemFromDb(id) {
  return db.ref(`${DB_ROOT}/${currentUser.uid}/items/${id}`).remove();
}
function newItemId() {
  return db.ref(`${DB_ROOT}/${currentUser.uid}/items`).push().key;
}

/* ---------------- openBD ISBN検索 ---------------- */
async function lookupISBN(isbnRaw) {
  const isbn = isbnRaw.replace(/[^0-9Xx]/g, '');
  if (!isbn) return null;
  const statusEl = document.getElementById('lookupStatus');
  statusEl.textContent = "検索中…";
  try {
    const res = await fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`);
    const data = await res.json();
    if (!data || !data[0]) {
      statusEl.textContent = "該当する書誌情報が見つかりませんでした（手入力してください）";
      return null;
    }
    const s = data[0].summary || {};
    statusEl.textContent = "書誌情報を取得しました";
    return {
      title: s.title || "",
      author: s.author || "",
      publisher: s.publisher || "",
      pubdate: s.pubdate || "",
      cover: s.cover || ""
    };
  } catch (e) {
    console.error(e);
    statusEl.textContent = "通信エラーが発生しました";
    return null;
  }
}
function parsePubdate(pubdate) {
  // openBDのpubdateは "20240115" "202401" "2024" などゆらぎがある
  if (!pubdate) return "";
  const digits = pubdate.replace(/[^0-9]/g, '');
  if (digits.length >= 8) return `${digits.slice(0,4)}-${digits.slice(4,6)}-${digits.slice(6,8)}`;
  if (digits.length >= 6) return `${digits.slice(0,4)}-${digits.slice(4,6)}-01`;
  if (digits.length >= 4) return `${digits.slice(0,4)}-01-01`;
  return "";
}

/* ---------------- Googleカレンダー連携 ---------------- */
async function calApiRequest(method, path, body) {
  if (!accessToken) throw new Error("NO_TOKEN");
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events${path}`, {
    method,
    headers: {
      "Authorization": `Bearer ${accessToken}`,
      "Content-Type": "application/json"
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401) throw new Error("TOKEN_EXPIRED");
  if (!res.ok && res.status !== 410) {
    const t = await res.text();
    throw new Error("API_ERROR: " + t);
  }
  if (res.status === 204 || res.status === 410) return null;
  return res.json();
}

function buildEventPayload(item) {
  return {
    summary: `📕 ${item.title}${item.volume ? ' 第' + item.volume + '巻' : ''} 発売`,
    description: [
      item.seriesName ? `シリーズ: ${item.seriesName}` : '',
      item.publisher ? `出版社: ${item.publisher}` : '',
      item.note || ''
    ].filter(Boolean).join('\n'),
    start: { date: item.releaseDate },
    end: { date: addDays(item.releaseDate, 1) }
  };
}

async function syncItemToCalendar(id, item) {
  if (!currentUser) return item;
  try {
    if (item.syncCalendar) {
      if (item.calendarEventId) {
        await calApiRequest("PUT", `/${item.calendarEventId}`, buildEventPayload(item));
      } else {
        const created = await calApiRequest("POST", "", buildEventPayload(item));
        item.calendarEventId = created ? created.id : null;
      }
    } else if (item.calendarEventId) {
      await calApiRequest("DELETE", `/${item.calendarEventId}`);
      item.calendarEventId = null;
    }
  } catch (e) {
    if (e.message === "TOKEN_EXPIRED" || e.message === "NO_TOKEN") {
      toast("カレンダー権限の有効期限が切れています。再ログインしてください");
    } else {
      console.error(e);
      toast("カレンダー反映に失敗しました");
    }
  }
  return item;
}

async function syncAllPending() {
  if (!currentUser || !accessToken) { toast("先にGoogleログインしてください"); return; }
  toast("カレンダーと同期しています…");
  const entries = Object.entries(allItems);
  for (const [id, item] of entries) {
    if (item.syncCalendar) {
      const updated = await syncItemToCalendar(id, item);
      await saveItemToDb(id, updated);
    }
  }
  toast("同期が完了しました");
}

/* ---------------- 一覧描画 ---------------- */
function getFilteredSorted() {
  let list = Object.entries(allItems).map(([id, it]) => ({ id, ...it }));

  if (!filters.showSpinoff) list = list.filter(it => !it.isSpinoff);
  if (filters.series) list = list.filter(it => (it.seriesName || '未分類') === filters.series);
  if (filters.search) {
    const q = filters.search.toLowerCase();
    list = list.filter(it => (it.title || '').toLowerCase().includes(q));
  }
  const today = todayStr();
  if (filters.status === 'unpurchased') list = list.filter(it => !it.purchased);
  if (filters.status === 'purchased') list = list.filter(it => it.purchased);
  if (filters.status === 'upcoming') list = list.filter(it => it.releaseDate >= today);
  if (filters.status === 'released') list = list.filter(it => it.releaseDate < today);

  if (filters.sort === 'date') {
    list.sort((a,b) => (a.releaseDate||'').localeCompare(b.releaseDate||''));
  } else if (filters.sort === 'series') {
    list.sort((a,b) => (a.seriesName||'').localeCompare(b.seriesName||'') || (a.releaseDate||'').localeCompare(b.releaseDate||''));
  } else if (filters.sort === 'added') {
    list.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
  }
  return list;
}

function populateSeriesFilter() {
  const sel = document.getElementById('seriesFilter');
  const current = sel.value;
  const names = Array.from(new Set(Object.values(allItems).map(it => it.seriesName || '未分類'))).sort();
  sel.innerHTML = `<option value="">すべてのシリーズ</option>` + names.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
  if (names.includes(current)) sel.value = current;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  populateSeriesFilter();
  const container = document.getElementById('listContainer');
  const list = getFilteredSorted();

  if (!currentUser) {
    container.innerHTML = `<div class="empty-state"><h3>ログインしてください</h3><p>右上の「Googleでログイン」から開始できます</p></div>`;
    return;
  }
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>まだ作品が登録されていません</h3><p>右下の「＋」から新規登録してください</p></div>`;
    return;
  }

  let html = '';
  if (filters.sort === 'series') {
    const groups = {};
    list.forEach(it => {
      const key = it.seriesName || '未分類';
      (groups[key] = groups[key] || []).push(it);
    });
    Object.keys(groups).sort().forEach(seriesName => {
      html += `<div class="series-group"><div class="series-heading"><h2>${escapeHtml(seriesName)}</h2><span class="series-count">${groups[seriesName].length}件</span></div>`;
      groups[seriesName].forEach(it => html += renderCard(it));
      html += `</div>`;
    });
  } else {
    html = list.map(renderCard).join('');
  }
  container.innerHTML = html;
  // 表紙・発売日が未取得のアイテムをバックグラウンドで補完
  autoFillMissingInfo();
}

const _autoFillInProgress = new Set();
const _autoFillDone = new Set();

async function autoFillMissingInfo() {
  const items = Object.entries(allItems);
  for (const [id, it] of items) {
    if (_autoFillInProgress.has(id) || _autoFillDone.has(id)) continue;
    const needsCover = !it.coverUrl;
    const needsDate = !it.releaseDate;
    if (!needsCover && !needsDate) { _autoFillDone.add(id); continue; }

    _autoFillInProgress.add(id);
    try {
      let updated = false;

      // ISBNがあればまずISBNで取得
      if (it.isbn && (needsCover || needsDate)) {
        try {
          const res = await fetch(`https://api.openbd.jp/v1/get?isbn=${it.isbn}`);
          const data = await res.json();
          if (data && data[0] && data[0].summary) {
            const s = data[0].summary;
            if (needsCover && s.cover) { it.coverUrl = s.cover; updated = true; }
            if (needsDate && s.pubdate) {
              const d = parsePubdate(s.pubdate);
              if (d) { it.releaseDate = d; updated = true; }
            }
          }
        } catch(e) {}
      }

      // まだ不足していればタイトル検索
      const stillNeedsCover = !it.coverUrl;
      const stillNeedsDate = !it.releaseDate;
      if (stillNeedsCover || stillNeedsDate) {
        const searchTitle = (it.seriesName || it.title || '').trim();
        if (searchTitle) {
          try {
            const res = await fetch(`https://api.openbd.jp/v1/search?title=${encodeURIComponent(searchTitle)}&limit=50`);
            const data = await res.json();
            if (data && data.length) {
              // 巻数が最大のもの（最新刊）を選ぶ
              const candidates = data.filter(b => b && b.summary && b.summary.title);
              candidates.sort((a, b) => {
                const va = extractVolume(a.summary.title) || 0;
                const vb = extractVolume(b.summary.title) || 0;
                return vb - va;
              });
              if (candidates.length) {
                const best = candidates[0].summary;
                if (stillNeedsCover && best.cover) { it.coverUrl = best.cover; updated = true; }
                if (stillNeedsDate && best.pubdate) {
                  const d = parsePubdate(best.pubdate);
                  if (d) { it.releaseDate = d; updated = true; }
                }
              }
            }
          } catch(e) {}
        }
      }

      if (updated) {
        it.updatedAt = Date.now();
        await saveItemToDb(id, it);
      }
      _autoFillDone.add(id);
    } catch(e) {
      console.warn('autoFill失敗:', id, e);
    } finally {
      _autoFillInProgress.delete(id);
    }
  }
}

function getLatestCover(seriesName) {
  const vols = Object.values(allItems)
    .filter(it => (it.seriesName || '') === seriesName && it.coverUrl)
    .sort((a, b) => {
      const na = parseFloat(a.volume) || 0;
      const nb = parseFloat(b.volume) || 0;
      return nb - na;
    });
  return vols.length ? vols[0].coverUrl : '';
}

function getLatestReleaseDate(seriesName) {
  const vols = Object.values(allItems)
    .filter(it => (it.seriesName || '') === seriesName && it.releaseDate)
    .sort((a, b) => b.releaseDate.localeCompare(a.releaseDate));
  return vols.length ? { date: vols[0].releaseDate, volume: vols[0].volume } : null;
}

// シリーズ名をonclick属性に安全に埋め込むためのグローバルマップ
window._seriesMap = {};
function registerSeries(key, name) {
  window._seriesMap[key] = name;
}
window.openSeriesByKey = function(key) {
  const name = window._seriesMap[key];
  if (name) openSeriesPanel(name);
};

function renderCard(it) {
  if (it.isSpinoff && it.spinoffVisible === false) {
    return renderHiddenSpinoffRow(it);
  }
  const today = todayStr();
  const isUpcoming = it.releaseDate ? it.releaseDate >= today : null;
  const coverUrl = it.seriesName ? (getLatestCover(it.seriesName) || it.coverUrl || '') : (it.coverUrl || '');

  // シリーズキーをマップに登録してonclickで安全に参照
  let onclickSeries = '';
  if (it.seriesName) {
    const key = 's_' + btoa(encodeURIComponent(it.seriesName)).replace(/[^a-zA-Z0-9]/g, '').slice(0, 20);
    registerSeries(key, it.seriesName);
    onclickSeries = `onclick="openSeriesByKey('${key}')"`;
  }

  // 最新刊の発売日（自分の発売日がなければシリーズの最新刊日付を表示）
  let releaseDateDisplay = '';
  if (it.releaseDate) {
    releaseDateDisplay = `<span class="date-text">発売日: ${fmtDate(it.releaseDate)}</span>`;
  } else if (it.seriesName) {
    const latest = getLatestReleaseDate(it.seriesName);
    if (latest) {
      releaseDateDisplay = `<span class="date-text" style="color:var(--gold)">最新刊: 第${escapeHtml(latest.volume || '?')}巻 ${fmtDate(latest.date)}</span>`;
    }
  }

  return `
    <div class="card ${it.purchased ? 'purchased' : ''}" data-id="${it.id}">
      <div class="stamp-mark">購入済</div>
      <div class="cover" style="${coverUrl ? `background-image:url('${coverUrl}')` : ''};cursor:${it.seriesName ? 'pointer' : 'default'}" ${onclickSeries}>${coverUrl ? '' : '表紙\nなし'}</div>
      <div class="card-body">
        <div class="card-top">
          <p class="card-title" style="cursor:${it.seriesName ? 'pointer' : 'default'}" ${onclickSeries}>${escapeHtml(it.title)}${it.volume ? `<span class="vol-badge">第${escapeHtml(it.volume)}巻</span>` : ''}</p>
        </div>
        <div class="meta-row">
          ${it.seriesName ? `<span class="series-link" ${onclickSeries}>${escapeHtml(it.seriesName)}</span>` : ''}
          ${it.isSpinoff ? `<span class="badge badge-spinoff">スピンオフ${it.parentSeries ? '・' + escapeHtml(it.parentSeries) : ''}</span>` : ''}
          ${isUpcoming === null ? `<span class="badge" style="background:#ede8e0;color:var(--ink-soft)">発売日未定</span>` : `<span class="badge ${isUpcoming ? 'badge-upcoming' : 'badge-released'}">${isUpcoming ? '発売前' : '発売済'}</span>`}
          ${it.syncCalendar ? `<span class="badge badge-cal">カレンダー連携中</span>` : ''}
        </div>
        <div class="meta-row">
          ${releaseDateDisplay}
        </div>
        <div class="card-actions">
          <div class="purchase-toggle ${it.purchased ? 'checked' : ''}" data-action="togglePurchased" data-id="${it.id}">
            <span class="box">${it.purchased ? '✓' : ''}</span> 購入済み
          </div>
          <a class="amazon-btn" href="${buildAmazonUrl(it)}" target="_blank" rel="noopener">Amazon</a>
          ${it.isSpinoff ? `<button class="icon-btn" data-action="hideSpinoff" data-id="${it.id}">このスピンオフを非表示</button>` : ''}
          <button class="icon-btn" data-action="edit" data-id="${it.id}">編集</button>
        </div>
      </div>
    </div>
  `;
}

function renderHiddenSpinoffRow(it) {
  return `
    <div class="card hidden-spinoff-row" data-id="${it.id}">
      <div class="hidden-spinoff-info">
        <span class="badge badge-spinoff">スピンオフ・非表示中</span>
        <span class="hidden-title">${escapeHtml(it.title)}${it.volume ? ` 第${escapeHtml(it.volume)}巻` : ''}</span>
      </div>
      <button class="icon-btn" data-action="showSpinoff" data-id="${it.id}">表示する</button>
    </div>
  `;
}

/* ---------------- イベント：一覧操作（イベント委譲） ---------------- */
document.getElementById('listContainer').addEventListener('click', async (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const id = target.dataset.id;
  const action = target.dataset.action;
  if (action === 'togglePurchased') {
    const item = allItems[id];
    item.purchased = !item.purchased;
    await saveItemToDb(id, item);
  } else if (action === 'hideSpinoff') {
    const item = allItems[id];
    item.spinoffVisible = false;
    await saveItemToDb(id, item);
    toast("このスピンオフを非表示にしました");
  } else if (action === 'showSpinoff') {
    const item = allItems[id];
    item.spinoffVisible = true;
    await saveItemToDb(id, item);
  } else if (action === 'edit') {
    openPanel(id);
  } else if (action === 'openSeries') {
    const seriesName = target.dataset.series;
    if (seriesName) openSeriesPanel(seriesName);
  }
});

const overlay = document.getElementById('overlay');
const panel = document.getElementById('panel');

function openPanel(id) {
  if (!currentUser) { toast("先にGoogleログインしてください"); return; }
  editingId = id || null;
  const it = id ? allItems[id] : null;

  document.getElementById('panelTitle').textContent = id ? '作品を編集' : '新規登録';
  document.getElementById('f_isbn').value = '';
  document.getElementById('f_title').value = it ? it.title || '' : '';
  document.getElementById('f_volume').value = it ? it.volume || '' : '';
  document.getElementById('f_date').value = it ? it.releaseDate || '' : '';
  document.getElementById('f_series').value = it ? it.seriesName || '' : '';
  document.getElementById('f_publisher').value = it ? it.publisher || '' : '';
  document.getElementById('f_author').value = it ? it.author || '' : '';
  document.getElementById('f_parent').value = it ? it.parentSeries || '' : '';
  document.getElementById('f_note').value = it ? it.note || '' : '';
  document.getElementById('lookupStatus').textContent = '';

  setSwitch('spinoffFieldSwitch', it ? !!it.isSpinoff : false);
  setSwitch('purchasedFieldSwitch', it ? !!it.purchased : false);
  setSwitch('calFieldSwitch', it ? !!it.syncCalendar : false);
  setSwitch('spinoffVisibleFieldSwitch', it ? it.spinoffVisible !== false : true);
  document.getElementById('parentSeriesWrap').classList.toggle('hidden', !(it && it.isSpinoff));
  document.getElementById('spinoffVisibleWrap').classList.toggle('hidden', !(it && it.isSpinoff));
  updateCalFieldDesc();

  document.getElementById('deleteBtn').classList.toggle('hidden', !id);
  overlay.classList.add('open');
  panel.classList.add('open');
}
function closePanel() {
  overlay.classList.remove('open');
  panel.classList.remove('open');
  editingId = null;
}
function setSwitch(elId, on) {
  document.getElementById(elId).classList.toggle('on', on);
}
function isOn(elId) {
  return document.getElementById(elId).classList.contains('on');
}

document.getElementById('cancelBtn').addEventListener('click', closePanel);

});

document.getElementById('titleSearchBtn').addEventListener('click', async () => {
  const query = document.getElementById('f_title_search').value.trim();
  if (!query) { toast("検索キーワードを入力してください"); return; }
  const btn = document.getElementById('titleSearchBtn');
  const resultsEl = document.getElementById('titleSearchResults');
  btn.textContent = '検索中…';
  btn.disabled = true;
  resultsEl.innerHTML = '';
  try {
    const res = await fetch(`https://api.openbd.jp/v1/search?title=${encodeURIComponent(query)}&limit=20`);
    const data = await res.json();
    if (!data || !data.length) {
      resultsEl.innerHTML = `<p style="font-size:12px;color:var(--ink-soft)">見つかりませんでした。ISBNで検索するか手入力してください。</p>`;
      return;
    }
    resultsEl.innerHTML = data.slice(0, 10).map((book, i) => {
      const s = book.summary || {};
      const pubdate = parsePubdate(s.pubdate || '');
      return `
        <div class="title-search-result" onclick="applyTitleSearchResult(${i})">
          <div class="title-search-cover" style="${s.cover ? `background-image:url('${s.cover}')` : ''}"></div>
          <div class="title-search-info">
            <div class="title-search-name">${escapeHtml(s.title || '')}</div>
            <div class="title-search-meta">${escapeHtml(s.author || '')}　${escapeHtml(s.publisher || '')}　${pubdate ? fmtDate(pubdate) : ''}</div>
          </div>
        </div>
      `;
    }).join('');
    window._titleSearchData = data.slice(0, 10).map(b => b.summary || {});
  } catch(e) {
    resultsEl.innerHTML = `<p style="font-size:12px;color:var(--stamp)">通信エラーが発生しました</p>`;
  } finally {
    btn.textContent = '検索';
    btn.disabled = false;
  }
});

window.applyTitleSearchResult = function(index) {
  const s = window._titleSearchData && window._titleSearchData[index];
  if (!s) return;
  document.getElementById('f_title').value = s.title || '';
  document.getElementById('f_isbn').value = (s.isbn || '').replace(/-/g, '');
  document.getElementById('f_author').value = s.author || '';
  document.getElementById('f_publisher').value = s.publisher || '';
  const d = parsePubdate(s.pubdate || '');
  if (d) document.getElementById('f_date').value = d;
  if (s.cover) document.getElementById('f_isbn').dataset.cover = s.cover;
  // 巻数も抽出
  const vol = extractVolume(s.title || '');
  if (vol) document.getElementById('f_volume').value = String(vol);
  // 検索結果を閉じる
  document.getElementById('titleSearchResults').innerHTML = '';
  document.getElementById('f_title_search').value = '';
  toast("情報を入力しました");
};

document.getElementById('lookupBtn').addEventListener('click', async () => {
  const isbn = document.getElementById('f_isbn').value;
  const info = await lookupISBN(isbn);
  if (!info) return;
  if (info.title) document.getElementById('f_title').value = info.title;

document.getElementById('saveBtn').addEventListener('click', async () => {
  const title = document.getElementById('f_title').value.trim();
  const releaseDate = document.getElementById('f_date').value;
  if (!title) {
    toast("タイトルは必須です");

  }

    calendarEventId: existing ? existing.calendarEventId || null : null,

  };

document.getElementById('deleteBtn').addEventListener('click', async () => {
  if (!editingId) return;
  if (!confirm("この作品を削除しますか？")) return;

  if (item && item.calendarEventId) {
    item.syncCalendar = false;
    await syncItemToCalendar(editingId, item);
  }
  await deleteItemFromDb(editingId);
  toast("削除しました");

});

/* ---------------- Amazon URL生成 ---------------- */
function buildAmazonUrl(item) {
  const q = encodeURIComponent((item.title || '') + (item.volume ? ' ' + item.volume + '巻' : ''));
  return `https://www.amazon.co.jp/s?k=${q}`;
}

/* ---------------- 巻数抽出ユーティリティ ---------------- */
function extractVolume(title) {
  // 「第N巻」「(N)」「N巻」「Vol.N」などから巻数を抽出
  const patterns = [
    /第(\d+)巻/,
    /\((\d+)\)/,
    /（(\d+)）/,
    /[Vv]ol\.?\s*(\d+)/,
    /(\d+)巻/,
    /\s(\d+)$/
  ];
  for (const p of patterns) {
    const m = title.match(p);
    if (m) return parseInt(m[1]);
  }
  return null;
}

/* ---------------- openBD新刊チェック ---------------- */
let currentSeriesName = '';

async function checkNewVolumes(seriesName) {
  const btn = document.getElementById('checkNewVolBtn');
  const section = document.getElementById('checkResultSection');
  const titleEl = document.getElementById('checkResultTitle');
  const listEl = document.getElementById('checkResultList');

  btn.disabled = true;
  btn.textContent = '検索中…';
  section.classList.add('hidden');
  listEl.innerHTML = '';

  try {
    const res = await fetch(`https://api.openbd.jp/v1/search?title=${encodeURIComponent(seriesName)}&limit=100`);
    const data = await res.json();

    if (!data || !data.length) {
      titleEl.textContent = 'openBDに該当する書誌情報が見つかりませんでした';
      section.classList.remove('hidden');
      return;
    }

    // 登録済みの巻数セット（ISBN or 巻数）
    const registeredIsbns = new Set(
      Object.values(allItems)
        .filter(it => (it.seriesName || '') === seriesName && it.isbn)
        .map(it => it.isbn)
    );
    const registeredVols = new Set(
      Object.values(allItems)
        .filter(it => (it.seriesName || '') === seriesName && it.volume)
        .map(it => String(it.volume))
    );

    // シリーズ名に近いタイトルのみ絞り込み
    const filtered = data.filter(book => {
      const s = book.summary || {};
      const t = s.title || '';
      return t.includes(seriesName) || seriesName.includes(t.replace(/\s*第?\d+巻?.*/, '').trim());
    });

    // 未登録のものだけ
    const newVols = filtered.filter(book => {
      const s = book.summary || {};
      const isbn = (s.isbn || '').replace(/-/g, '');
      const volNum = extractVolume(s.title || '');
      if (isbn && registeredIsbns.has(isbn)) return false;
      if (volNum && registeredVols.has(String(volNum))) return false;
      return true;
    });

    if (!newVols.length) {
      titleEl.textContent = '未登録の新刊は見つかりませんでした（登録済みかopenBDに未掲載の可能性があります）';
      section.classList.remove('hidden');
      return;
    }

    titleEl.textContent = `${newVols.length}件の未登録巻が見つかりました`;
    listEl.innerHTML = newVols.map((book, i) => {
      const s = book.summary || {};
      const pubdate = parsePubdate(s.pubdate || '');
      return `
        <div class="new-vol-row" id="newvol_${i}">
          <div class="new-vol-info">
            <div class="new-vol-title">${escapeHtml(s.title || '')}</div>
            <div class="new-vol-meta">${s.publisher || ''}　${pubdate ? fmtDate(pubdate) : '発売日不明'}</div>
          </div>
          <button class="add-vol-btn" onclick="addNewVol(${i}, ${JSON.stringify(s).replace(/"/g, '&quot;')})">追加</button>
        </div>
      `;
    }).join('');
    section.classList.remove('hidden');

    // 追加用データを一時保存
    window._newVolData = newVols.map(b => b.summary || {});

  } catch(e) {
    console.error(e);
    titleEl.textContent = '通信エラーが発生しました';
    section.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = '📡 新刊をチェック（openBD）';
  }
}

async function addNewVol(index, summary) {
  const s = window._newVolData ? window._newVolData[index] : summary;
  if (!s) return;
  const volNum = extractVolume(s.title || '');
  const id = newItemId();
  const item = {
    title: s.title || '',
    volume: volNum ? String(volNum) : '',
    releaseDate: parsePubdate(s.pubdate || '') || '',
    seriesName: currentSeriesName,
    publisher: s.publisher || '',
    author: s.author || '',
    isbn: (s.isbn || '').replace(/-/g, ''),
    isSpinoff: false,
    parentSeries: '',
    spinoffVisible: true,
    purchased: false,
    syncCalendar: false,
    note: '',
    coverUrl: s.cover || '',
    calendarEventId: null,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  await saveItemToDb(id, item);
  // 追加した行を消す
  const row = document.getElementById(`newvol_${index}`);
  if (row) row.remove();
  toast(`「${item.title}」を追加しました`);
  // シリーズパネルを更新
  openSeriesPanel(currentSeriesName);
}

/* ---------------- シリーズ詳細パネル ---------------- */
const seriesPanel = document.getElementById('seriesPanel');
document.getElementById('seriesPanelClose').addEventListener('click', closeSeriesPanel);
document.getElementById('checkNewVolBtn').addEventListener('click', () => {
  if (currentSeriesName) checkNewVolumes(currentSeriesName);
});

function openSeriesPanel(seriesName) {
  currentSeriesName = seriesName;
  const vols = Object.values(allItems)
    .filter(it => (it.seriesName || '') === seriesName)
    .sort((a,b) => {
      const na = parseFloat(a.volume) || 0;
      const nb = parseFloat(b.volume) || 0;
      return na - nb || (a.releaseDate||'').localeCompare(b.releaseDate||'');
    });

  const total = vols.length;
  const purchased = vols.filter(v => v.purchased).length;
  const today = todayStr();
  const upcoming = vols.filter(v => v.releaseDate >= today).length;

  document.getElementById('seriesPanelTitle').textContent = seriesName;
  document.getElementById('checkResultSection').classList.add('hidden');
  document.getElementById('checkResultList').innerHTML = '';

  // 最新刊の表紙をヘッダーに表示
  const coverUrl = getLatestCover(seriesName);
  const coverWrap = document.getElementById('seriesCoverWrap');
  if (coverUrl) {
    coverWrap.style.backgroundImage = `url('${coverUrl}')`;
    coverWrap.style.display = 'block';
  } else {
    coverWrap.style.backgroundImage = '';
    coverWrap.style.display = 'none';
  }
  document.getElementById('seriesStats').innerHTML = `
    <div class="stat-chip">全 <strong>${total}</strong> 巻</div>
    <div class="stat-chip">購入済 <strong>${purchased}</strong> 巻</div>
    <div class="stat-chip">未購入 <strong>${total - purchased}</strong> 巻</div>
    ${upcoming > 0 ? `<div class="stat-chip">発売前 <strong>${upcoming}</strong> 巻</div>` : ''}
  `;

  document.getElementById('seriesVolList').innerHTML = vols.map(v => {
    const isUpcoming = v.releaseDate >= today;
    return `
      <div class="series-vol-row">
        <div class="series-vol-info">
          <div class="series-vol-title">${escapeHtml(v.title)}${v.volume ? `　第${escapeHtml(v.volume)}巻` : ''}</div>
          <div class="series-vol-meta">
            ${fmtDate(v.releaseDate)}　
            <span class="badge ${isUpcoming ? 'badge-upcoming' : 'badge-released'}">${isUpcoming ? '発売前' : '発売済'}</span>
          </div>
        </div>
        <div class="series-vol-actions">
          <a class="amazon-btn" href="${buildAmazonUrl(v)}" target="_blank" rel="noopener">Amazon</a>
          <div class="purchase-toggle ${v.purchased ? 'checked' : ''}" data-action="togglePurchased" data-id="${v.id}" style="font-size:11px;">
            <span class="box">${v.purchased ? '✓' : ''}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('overlay').classList.add('open');
  seriesPanel.classList.add('open');
}

document.getElementById('seriesVolList').addEventListener('click', async (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const id = target.dataset.id;
  const action = target.dataset.action;
  if (action === 'togglePurchased' && id) {
    const item = allItems[id];
    if (!item) return;
    item.purchased = !item.purchased;
    await saveItemToDb(id, item);
    // ボタンの見た目だけ即時更新
    target.classList.toggle('checked', item.purchased);
    const box = target.querySelector('.box');
    if (box) box.textContent = item.purchased ? '✓' : '';
    // シリーズの統計も更新
    openSeriesPanel(currentSeriesName);
  }
});

function closeSeriesPanel() {
  seriesPanel.classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
